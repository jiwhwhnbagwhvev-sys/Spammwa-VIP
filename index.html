<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trapenden V6 FINAL LED STATUS</title>

<style>
video, canvas{
pointer-events:none;
}
body{margin:0;font-family:'Segoe UI';background:black;color:white;overflow:hidden;}

#bgVideo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
pointer-events:none; /* 🔥 BIAR GAK NUTUP KLIK */
opacity:0.4;
}

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:0;
}

.card{
position:relative;
z-index:10;
}
  
/* MENU */
#menuBtn{
position:fixed;top:15px;right:15px;
font-size:26px;color:#00aaff;
z-index:999;cursor:pointer;
text-shadow:0 0 10px #00aaff;
}

#menuBox{
position:fixed;top:60px;right:15px;
background:#111;padding:12px;
border-radius:12px;display:none;
z-index:999;box-shadow:0 0 20px red;
}

.warning{
background:#332701;color:yellow;
padding:10px;border-radius:10px;font-size:12px;
}

/* CARD */
.card{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
width:90%;max-width:360px;
padding:20px;border-radius:20px;
background:#111;box-shadow:0 0 25px red;
text-align:center;z-index:10;
}

/* LOGO GRID */
.logo-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;margin-bottom:10px;
}

.logo-grid img{
width:100%;border-radius:6px;
animation:logoGlow 1.2s infinite alternate;
}

@keyframes logoGlow{
from{box-shadow:0 0 5px red;}
to{box-shadow:0 0 20px red,0 0 30px red;}
}

/* LED TEXT */
.title-led{
margin-top:10px;font-weight:bold;
animation:ledText 1s infinite alternate;
}
@keyframes ledText{
from{color:red;text-shadow:0 0 5px red;}
to{color:white;text-shadow:0 0 10px white;}
}

/* INPUT */
input{
width:100%;padding:12px;margin-top:10px;
border:none;border-radius:10px;
background:#1a1a1a;color:white;
}

/* BUTTON LED */
.btn-led{
background:#111;color:red;
border:2px solid red;
box-shadow:0 0 10px red,0 0 20px red inset;
cursor:pointer;font-weight:bold;
}

.btn-led.active{
animation:ledGlow 1s infinite alternate;
}

@keyframes ledGlow{
from{box-shadow:0 0 5px red;}
to{box-shadow:0 0 25px red;}
}

/* MENU LED */
.menu-led{
margin-top:12px;padding:15px;
border-radius:12px;background:#111;
border:2px solid #222;cursor:pointer;
}

.menu-led.active{
border:2px solid red;
box-shadow:0 0 20px red,0 0 40px red inset;
animation:ledGlow 1s infinite alternate;
}

/* STATUS BOX */
.status{
margin-top:10px;padding:10px;border-radius:10px;display:none;
}
.process{background:#664d03;color:yellow;}
.success{background:#0f5132;}
.stop{background:#842029;}

.error{color:red;font-size:12px;margin-top:5px;}

/* STATUS LED ONLINE OFFLINE */
.status-led{
margin-top:8px;
padding:6px;
border-radius:8px;
font-size:13px;
font-weight:bold;
text-align:center;
animation:blink 1s infinite alternate;
}

.online-led{
color:#00ff88;
box-shadow:0 0 10px #00ff88,0 0 20px #00ff88;
}

.offline-led{
color:#ff2b2b;
box-shadow:0 0 10px red,0 0 25px red;
}

@keyframes blink{
from{opacity:0.6;}
to{opacity:1;}
}
</style>
</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="https://raw.githubusercontent.com/jiwhwhnbagwhvev-sys/Spammwa-VIP/main/anime.mp4" type="video/mp4">
</video>

<!-- MENU -->
<div id="menuBtn" onclick="toggleMenu()">☰</div>

<div id="menuBox">
<button class="btn-led active" onclick="logout()" style="margin-bottom:10px;">🚪 LOGOUT</button>

<div class="warning">
⚠️ WARNING VIP<br>
Akun hanya bisa 1 perangkat! Logout dulu jika pindah device.
</div>
</div>

<!-- LOGIN -->
<div class="card" id="loginBox">

<div style="margin-bottom:15px;">
  <img src="logo.png" style="width:120px;border-radius:10px;">
</div>

<h2>LOGIN MENU</h2>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<button onclick="buyAkses()" style="background:#00c853;color:white;">💰 BUY AKSES</button>

<div class="title-led">⚡ Pecinta HP Kentang ⚡</div>

</div> <!-- 🔥 TUTUP LOGIN DI SINI -->
<!-- SOSIAL MINI -->
<div style="margin-top:10px; text-align:center;">

    <img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png" width="18">
  </a>

  <a href="https://whatsapp.com/channel/0029Vb7Ve1b3wtbCclABd11w" target="_blank">

  </a>

  <a href="https://www.tiktok.com/@pecintahpkentang?_r=1&_t=ZS-95X7sUO8vNH" target="_blank">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046126.png" width="18">
  </a>
</div>

<!-- STATUS LED -->
<div id="statusOnline" class="status-led"></div>

<input id="target" placeholder="812xxxxxxx">
<div id="errorNomor" class="error"></div>

<div class="menu-led" onclick="pilihMenu('wa')">🔥 SPAM WA</div>
<div class="menu-led" onclick="pilihMenu('call')">📞 SPAM CALL</div>

<div style="margin-top:10px;">
  <button class="btn-led" onclick="startSpam()">🔥 EKSEKUSI</button>
</div>

<div style="margin-top:15px;">
  <button class="btn-led" onclick="stopSpam()">⛔ STOP</button>
</div>

<div id="status" class="status"></div>

</div>

<script>
 
// 🔐 DATABASE AKUN (WAJIB LOGIN DARI SINI)
const akunList = [
  {user:"admin", pass:"123"},
  {user:"Apin25", pass:"apin25"},
  {user:"EnvioJambu", pass:"Dafa1234"},
  {user:"andra", pass:"0820"}
];
// AUTO LOGIN (ANTI TEMBUS)
window.onload=function(){

let saved = localStorage.getItem("user");

// 🔍 cek apakah user ada di database
let valid = akunList.find(a => a.user === saved);

if(valid){
loginBox.style.display="none";
panel.style.display="block";
welcome.innerText="Halo, "+saved;
}else{
localStorage.removeItem("user"); // hapus user ilegal
}

updateStatus();
setInterval(updateStatus,30000);

}

// STATUS ONLINE OFFLINE
function updateStatus(){

let now=new Date();
let jam=now.getHours();
let menit=now.getMinutes();

let mulai=11*60;
let selesai=21*60+30;

let sekarang=jam*60+menit;

let el=document.getElementById("statusOnline");

el.classList.remove("online-led","offline-led");

if(sekarang>=mulai && sekarang<=selesai){
el.innerHTML="🟢 STATUS: ONLINE / AKTIF";
el.classList.add("online-led");
}else{
el.innerHTML="🔴 STATUS: SEDANG OFFLINE";
el.classList.add("offline-led");
}
}

// MENU
function toggleMenu(){
menuBox.style.display =
menuBox.style.display=="block"?"none":"block";
}

// LOGIN
function login(){

let u = document.getElementById("user").value.trim();
let p = document.getElementById("pass").value.trim();

if(u === "" || p === ""){
notif.innerText = "Isi semua!";
return;
}

// 🔐 VALIDASI KE DATABASE
let valid = akunList.find(a => a.user === u && a.pass === p);

if(!valid){
notif.innerText = "❌ Username / Password salah!";
return;
}
 
// ✅ LOGIN BERHASIL
localStorage.setItem("user", u);

document.getElementById("loginBox").style.display = "none";
document.getElementById("panel").style.display = "block";

document.getElementById("welcome").innerText = "Halo, " + u;
updateStatus();

}
// LOGOUT
function logout(){
localStorage.removeItem("user");
location.reload();
}

// BUY
function buyAkses(){
window.location.href="https://wa.me/6281385998324";
}

// DAFTAR
function daftarAkun(){
let u=user.value;
let p=pass.value;

if(u==""||p==""){
alert("Isi dulu!");
return;
}

let pesan=`📌 *Vip fitur* - (register)
─────────────────────
- *Username:* ${u}
- *Password:* ${p}
─────────────────────
Hi, Saya mau beli akun vip, mohon di proses...`;

window.location.href="https://wa.me/6281385998324?text="+encodeURIComponent(pesan);
}

// MENU SELECT
let selectedMenu="";
function pilihMenu(m){
selectedMenu=m;
menuWA.classList.remove("active");
menuCALL.classList.remove("active");
if(m=="wa")menuWA.classList.add("active");
else menuCALL.classList.add("active");
}

// VALIDASI
function valid(n){
if(n=="") return "Isi nomor!";
if(!n.startsWith("8")) return "Harus diawali 8!";
if(isNaN(n)) return "Harus angka!";
return "";
}

// SYSTEM
let interval;
let cooldownInterval;

function startSpam(){

btnRun.classList.add("active");
btnStop.classList.remove("active");

let n=target.value;
let e=valid(n);

if(e!=""){
errorNomor.innerText=e;
return;
}else errorNomor.innerText="";

if(selectedMenu==""){
alert("Pilih menu!");
return;
}

let status=document.getElementById("status");
status.style.display="block";
status.className="status process";

let t=60;

interval=setInterval(()=>{
t--;
status.innerHTML="⏳ Sedang di proses... "+t+" detik";

if(t<=0){
clearInterval(interval);

status.className="status success";
status.innerHTML="✔️ Spam berlangsung<br><span id='cd'>05:00</span>";

let pesan= selectedMenu=="wa"
? "versi v6.0 | Spam WA | "+n
: "versi v6.0 | Spam Call | "+n;

let waApp="whatsapp://send?phone=6281385998324&text="+encodeURIComponent(pesan);
let waWeb="https://wa.me/6281385998324?text="+encodeURIComponent(pesan);

window.location.href=waApp;
setTimeout(()=>{window.location.href=waWeb;},1500);

// cooldown
let cd=300;
cooldownInterval=setInterval(()=>{
cd--;

let m=Math.floor(cd/60);
let s=cd%60;

document.getElementById("cd").innerText=
(m<10?"0"+m:m)+":"+(s<10?"0"+s:s);

if(cd<=0){
clearInterval(cooldownInterval);
status.innerHTML="✔️ Selesai";
}
},1000);

}

},1000);
}

// STOP
function stopSpam(){
btnStop.classList.add("active");
btnRun.classList.remove("active");

clearInterval(interval);
clearInterval(cooldownInterval);

status.className="status stop";
status.style.display="block";
status.innerHTML="⛔ Dihentikan!";
}

// PARTICLE
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let p=[];
for(let i=0;i<60;i++){
p.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,r:2,s:0.5});
}

function anim(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="red";
p.forEach(a=>{
ctx.beginPath();
ctx.arc(a.x,a.y,a.r,0,Math.PI*2);
ctx.fill();
a.y+=a.s;
if(a.y>canvas.height){
a.y=0;a.x=Math.random()*canvas.width;
}
});
requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
