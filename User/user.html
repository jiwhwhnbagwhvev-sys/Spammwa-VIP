<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User VIP Panel</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#0b0f1a;
  color:white;
}

/* LOGIN */
.login {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.box {
  background:#111827;
  padding:20px;
  border-radius:15px;
  width:300px;
}

.input {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1f2937;
  color:white;
}

.btn {
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#ff4fd8;
  color:white;
}

/* MAIN */
.main { display:none; }

.header {
  display:flex;
  align-items:center;
  padding:15px;
  background:#111827;
}

.menu {
  font-size:22px;
  cursor:pointer;
}

/* SIDEBAR */
.sidebar {
  position:fixed;
  top:0;
  left:-220px;
  width:220px;
  height:100%;
  background:#020617;
  padding:20px;
  transition:0.3s;
}

.sidebar.active { left:0; }

/* LOGO */
.logo-box {
  text-align:center;
  margin-top:20px;
}

.logo-box img {
  width:200px;
  border-radius:20px;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { filter: drop-shadow(0 0 5px #ff4fd8); }
  to { filter: drop-shadow(0 0 25px #ff4fd8); }
}

/* CARD */
.card {
  background:#111827;
  padding:15px;
  border-radius:15px;
  margin:15px;
}

.role-box {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.role {
  padding:12px;
  background:#1f2937;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

.role.active { background:#ff4fd8; }

.preview {
  width:100%;
  margin-top:10px;
  border-radius:10px;
  display:none;
}

.item {
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="loginPage">
  <div class="box">
    <h3>Login VIP</h3>
    <input id="loginUser" class="input" placeholder="Username">
    <input id="loginPass" type="password" class="input" placeholder="Password">
    <button class="btn" onclick="login()">Masuk</button>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="mainPage">

  <div class="header">
    <div class="menu" onclick="toggleMenu()">☰</div>
    <div style="margin-left:10px;">Dashboard VIP</div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <p onclick="logout()" style="color:red;cursor:pointer;">Logout</p>
  </div>

  <!-- LOGO -->
  <div class="logo-box">
    <img src="logo.png">
    <h2 style="color:#ff4fd8;">✨ Input Akun VIP ✨</h2>
  </div>

  <!-- FORM -->
  <div class="card">
    <h3>Buat Akun</h3>

    <input id="username" class="input" placeholder="Username">
    <input id="password" class="input" placeholder="Password">

    <input type="file" id="file" class="input" accept="image/*">
    <img id="preview" class="preview">

    <div class="role-box">
      <div class="role" onclick="selectRole(this)">OWNER</div>
      <div class="role" onclick="selectRole(this)">RESELLER</div>
      <div class="role" onclick="selectRole(this)">VIP</div>
      <div class="role" onclick="selectRole(this)">MEMBER</div>
    </div>

    <button class="btn" onclick="kirim()">Ajukan</button>
  </div>

  <!-- RIWAYAT -->
  <div class="card">
    <h3>Riwayat</h3>
    <div id="list"></div>
  </div>

</div>

<script>

// 🔥 LINK DB GITHUB RAW
const DB_URL = "https://raw.githubusercontent.com/jiwhwhnbagwhvev-sys/Spammwa-VIP/main/db.json";

// ambil db
async function loadDB(){
  try{
    let res = await fetch(DB_URL + "?t=" + Date.now());

    if(!res.ok){
      throw new Error("Status " + res.status);
    }

    let data = await res.json();

    if(!data.akun){
      throw new Error("Format db.json salah");
    }

    return data;

  }catch(e){
    alert("❌ DB Error: " + e.message);
    return null;
  }
}

// LOGIN
async function login(){
  let u = loginUser.value.trim();
  let p = loginPass.value.trim();

  if(!u || !p){
    alert("Isi username & password!");
    return;
  }

  let db = await loadDB();
  if(!db) return;

  let found = db.akun.find(a => a.user === u && a.pass === p);

  if(found){
    localStorage.setItem("loginUser", u);
    loginPage.style.display="none";
    mainPage.style.display="block";
  } else {
    alert("❌ Username / Password salah!");
  }
}

// AUTO LOGIN
if(localStorage.getItem("loginUser")){
  loginPage.style.display="none";
  mainPage.style.display="block";
}

// MENU
function toggleMenu(){
  sidebar.classList.toggle("active");
}

function logout(){
  localStorage.removeItem("loginUser");
  location.reload();
}

// ROLE
function selectRole(el){
  document.querySelectorAll(".role").forEach(r=>r.classList.remove("active"));
  el.classList.add("active");
}

// UPLOAD
file.onchange = e => {
  let f = e.target.files[0];
  if(!f) return;

  if(!f.type.startsWith("image/")){
    alert("Harus gambar!");
    return;
  }

  let reader = new FileReader();
  reader.onload = () => {
    preview.src = reader.result;
    preview.style.display="block";
  };
  reader.readAsDataURL(f);
};

// KIRIM
function kirim(){
  let role = document.querySelector(".role.active")?.innerText;

  if(!username.value || !password.value || !role || !preview.src){
    alert("Lengkapi semua data!");
    return;
  }

  let data = JSON.parse(localStorage.getItem("permohonan")) || [];

  data.push({
    pembuat: localStorage.getItem("loginUser"),
    username: username.value,
    password: password.value,
    role: role,
    img: preview.src,
    status:"Pending",
    waktu:new Date().toLocaleString()
  });

  localStorage.setItem("permohonan", JSON.stringify(data));

  alert("Berhasil dikirim!");
  load();
}

// LOAD RIWAYAT
function load(){
  let data = JSON.parse(localStorage.getItem("permohonan")) || [];

  list.innerHTML = data.slice().reverse().map(d=>`
    <div class="item">
      <b>${d.username}</b> (${d.role})<br>
      Oleh: ${d.pembuat}<br>
      ${d.status}<br>
      <img src="${d.img}">
    </div>
  `).join("");
}

load();

</script>

</body>
</html>
